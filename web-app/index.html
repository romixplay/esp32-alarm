<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNTITLED // SAFE</title>
    <style>
        :root { --bg: #ececec; --text: #000000; --accent: #ff0000; --terminal-bg: #111; --terminal-text: #0f0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 1rem; box-sizing: border-box; }
        .container { border: 4px solid var(--text); padding: 2rem; width: 100%; max-width: 450px; box-shadow: 8px 8px 0px var(--text); background: #fff; }
        h1 { text-transform: uppercase; border-bottom: 2px solid var(--text); padding-bottom: 0.5rem; margin-top: 0; display: flex; justify-content: space-between; align-items: center; font-size: 1.5rem; }
        .control-group { margin-bottom: 1.5rem; border: 2px solid var(--text); padding: 1rem; }
        label { font-weight: bold; display: block; margin-bottom: 0.5rem; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        input[type="range"] { width: 100%; margin-bottom: 1rem; }
        input[type="number"] { width: 60px; font-family: inherit; font-weight: bold; border: 2px solid var(--text); text-align: center; }
        button { background: transparent; border: 2px solid var(--text); padding: 0.75rem 1rem; font-family: inherit; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; margin-bottom: 0.5rem; transition: all 0.1s; user-select: none; }
        button:active:not(:disabled) { background: var(--text); color: var(--bg); transform: translate(2px, 2px); }
        button.danger { color: var(--accent); border-color: var(--accent); }
        button.danger:active:not(:disabled) { background: var(--accent); color: #fff; }
        button.hold-btn { background: var(--text); color: var(--bg); }
        button.hold-btn:active:not(:disabled) { background: var(--accent); border-color: var(--accent); }
        button:disabled { opacity: 0.5; cursor: not-allowed; border-color: #999; color: #999; }
        .terminal { background-color: var(--terminal-bg); color: var(--terminal-text); padding: 1rem; font-size: 0.85rem; height: 100px; overflow-y: auto; border: 2px solid var(--text); display: flex; flex-direction: column; justify-content: flex-end; }
        .status-connecting { background: #888; color: #fff; }
        .status-online { background: #00cc00; color: #000; }
        .status-offline { background: var(--accent); color: #fff; }
    </style>
</head>
<body>

    <div class="container" id="app" style="display: none;">
        <h1>
            UNTITLED~SAFE
            <span id="status-badge" class="status-connecting" style="padding: 2px 8px; font-size: 0.9rem; border: 2px solid var(--text);">CONNECTING</span>
        </h1>
        
        <div class="control-group">
            <div class="flex-row">
                <label>VOLUME:</label>
                <span id="vol-display">50%</span>
            </div>
            <input type="range" id="volume-slider" min="0" max="100" value="50" onchange="updateVolume()">
        </div>

        <div class="control-group">
            <label>MANUAL ALARM TRIGGER</label>
            <button class="danger" onclick="triggerAlarm(3)">SOUND ALARM (3s)</button>
            <button class="danger hold-btn" id="hold-btn">HOLD TO PLAY</button>
        </div>

        <div class="control-group">
            <div class="flex-row">
                <label><input type="checkbox" id="periodic-check" onchange="updatePeriodic()"> PERIODIC BEEP</label>
            </div>
            <div class="flex-row">
                <span>Interval (Minutes):</span>
                <input type="number" id="periodic-mins" min="1" max="60" value="5" onchange="updatePeriodic()">
            </div>
        </div>

        <div class="control-group" style="border-color: var(--accent);">
            <label style="color: var(--accent);">ADMIN: FIRMWARE OVER-THE-AIR</label>
            <button class="danger" onclick="syncFromGit()">PULL LATEST GITHUB BUILD</button>
        </div>

        <div class="control-group">
            <label>LIVE SYSTEM LOG:</label>
            <div class="terminal" id="live-log">> Waiting for system connection...</div>
        </div>
        
        <button onclick="clearSession()" style="margin-top: 1rem; border-color: #888; color: #888;">LOG OUT / CLEAR CACHE</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const keyPart1 = "AIzaSyDabQ4ZNM"; 
        const keyPart2 = "Ufbloh9ePIudCoYfZeYf4ledA";
        
        const firebaseConfig = {
            apiKey: keyPart1 + keyPart2,
            databaseURL: "https://untitledcafe-bfd05-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "untitledcafe-bfd05"
        };

        let db;
        let cloudFunc;
        let isSystemOffline = true;
        let currentPin = localStorage.getItem('session_pin');

        function checkAccess() {
            if (currentPin) {
                document.getElementById('app').style.display = 'block';
                initFirebase();
                return;
            }

            const entry = prompt("ENTER SYSTEM PASSCODE:");
            if (!entry) {
                document.body.innerHTML = "<h2 style='text-align:center;'>ACCESS DENIED</h2>";
                return;
            }

            localStorage.setItem('session_pin', entry);
            currentPin = entry;
            document.getElementById('app').style.display = 'block';
            initFirebase();
        }

        function clearSession() {
            localStorage.clear();
            location.reload();
        }

        function initFirebase() {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            cloudFunc = firebase.app().functions('us-central1'); 
            
            setupHeartbeat();
            setupLiveLogs();
            setupStateSync();
            setupHoldButton();
        }

        async function sendSecureCommand(actionName, payloadData = {}) {
            if (isSystemOffline) { 
                const logBox = document.getElementById('live-log');
                logBox.innerHTML += `<br><span style="color: var(--accent);">[ERROR] System offline. Command ignored.</span>`;
                logBox.scrollTop = logBox.scrollHeight;
                return; 
            }

            const secureCommand = cloudFunc.httpsCallable('secureCommand');
            
            try {
                const response = await secureCommand({
                    pin: currentPin,
                    action: actionName,
                    payload: payloadData
                });
                console.log(response.data.message);
            } catch (error) {
                const logBox = document.getElementById('live-log');
                logBox.innerHTML += `<br><span style="color: var(--accent);">[AUTH ERROR] ${error.message}</span>`;
                logBox.scrollTop = logBox.scrollHeight;
                if (error.message.includes("ACCESS DENIED")) {
                    setTimeout(clearSession, 2000); 
                }
            }
        }

        function setUIStatus(statusStr) {
            const badge = document.getElementById('status-badge');
            badge.innerText = statusStr;
            badge.className = ''; 
            if (statusStr === "CONNECTING...") { badge.classList.add('status-connecting'); isSystemOffline = true; } 
            else if (statusStr === "ONLINE") { badge.classList.add('status-online'); isSystemOffline = false; } 
            else { badge.classList.add('status-offline'); isSystemOffline = true; }
        }

        function setupHeartbeat() {
            setUIStatus("CONNECTING...");
            db.ref('system/last_ping').on('value', (snapshot) => {
                if (snapshot.exists()) { 
                    if (Date.now() - snapshot.val() < 15000) setUIStatus("ONLINE");
                    else setUIStatus("OFFLINE");
                }
            });
            setInterval(() => {
                db.ref('system/last_ping').once('value').then((snapshot) => {
                    if (snapshot.exists() && (Date.now() - snapshot.val() > 15000)) setUIStatus("OFFLINE");
                });
            }, 5000);
        }

        function setupLiveLogs() {
            let logHistory = [];
            db.ref('system/latest_log').on('value', (snapshot) => {
                if (snapshot.val()) {
                    const time = new Date().toLocaleTimeString('en-US', { hour12: false });
                    logHistory.push(`[${time}] > ${snapshot.val()}`);
                    if (logHistory.length > 5) logHistory.shift(); 
                    document.getElementById('live-log').innerHTML = logHistory.join('<br>');
                }
            });
        }

        function setupStateSync() {
            db.ref('alarm_state').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (data.volume !== undefined) {
                        document.getElementById('volume-slider').value = data.volume;
                        document.getElementById('vol-display').innerText = data.volume + "%";
                    }
                    if (data.periodic_active !== undefined) { document.getElementById('periodic-check').checked = data.periodic_active; }
                    if (data.periodic_mins !== undefined) { document.getElementById('periodic-mins').value = data.periodic_mins; }
                }
            });
        }

        function updateVolume() { sendSecureCommand('update_volume', { volume: parseInt(document.getElementById('volume-slider').value) }); }
        function updatePeriodic() { sendSecureCommand('update_periodic', { active: document.getElementById('periodic-check').checked, mins: parseInt(document.getElementById('periodic-mins').value) }); }
        function triggerAlarm(seconds) { sendSecureCommand('trigger_alarm', { duration: seconds }); }

        function setupHoldButton() {
            const btn = document.getElementById('hold-btn');
            const pressAction = (e) => { if(e) e.preventDefault(); sendSecureCommand('hold_alarm', { active: true }); };
            const releaseAction = (e) => { if(e) e.preventDefault(); sendSecureCommand('hold_alarm', { active: false }); };
            btn.addEventListener('mousedown', pressAction); btn.addEventListener('mouseup', releaseAction); btn.addEventListener('mouseleave', releaseAction);
            btn.addEventListener('touchstart', pressAction); btn.addEventListener('touchend', releaseAction);
        }

        function syncFromGit() {
            if (confirm("WARNING: Proceed with GitHub OTA flash?")) {
                sendSecureCommand('sync_firmware', { url: 'https://raw.githubusercontent.com/romixplay/esp32-alarm/main/firmware/firmware.bin' });
            }
        }

        const script = document.createElement('script');
        script.src = "https://www.gstatic.com/firebasejs/8.10.1/firebase-functions.js";
        script.onload = checkAccess;
        document.head.appendChild(script);
    </script>
</body>
</html>
